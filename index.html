<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Nomads 1 | Pro Drone Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Syncopate:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; overflow-x: hidden; }
        .heading { font-family: 'Syncopate', sans-serif; }
        .gradient-hero { background: radial-gradient(circle at top right, #1e40af, #020617 75%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* --- THE MAVIC 3 PRO UNIT --- */
        #drone-asset {
            position: absolute;
            width: 350px;
            z-index: 100;
            opacity: 0;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.8));
            pointer-events: none;
        }

        /* Flight Animation Path */
        @keyframes flight-sequence {
            0% { transform: translate(-600px, 600px) scale(0.3) rotate(15deg); opacity: 0; }
            15% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            40% { transform: translate(20px, -20px) rotate(2deg); }
            50% { filter: brightness(4) contrast(1.2); } /* Flash for Photo */
            85% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(600px, -200px) scale(0.3) rotate(-10deg); opacity: 0; }
        }
        .active-flight { animation: flight-sequence 12s cubic-bezier(0.33, 1, 0.68, 1) forwards; }

        /* --- FORM STYLING: FORCED BLACK TEXT --- */
        .input-field {
            background-color: #ffffff !important;
            color: #000000 !important;
            font-weight: 800;
            border: none;
        }
        .input-field:focus { ring: 4px solid #3b82f6; }

        /* T-Formation Mapping */
        .t-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 340px; }
        .t-base { grid-column: 2 / 3; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[200] p-8 flex justify-between items-center glass-panel">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl shadow-lg">AN</div>
            <h1 class="heading text-lg tracking-tighter">AIR NOMADS 1</h1>
        </div>
        <div class="bg-white text-black px-8 py-2 rounded-full font-black text-xs cursor-pointer">PILOT LOGIN</div>
    </nav>

    <header class="h-screen relative flex items-center justify-center gradient-hero overflow-hidden">
        
        <img id="drone-asset" src="https://i.ibb.co/Xz9yvVb/dji-mavic-3-pro.png" alt="DJI Mavic 3 Pro">

        <div class="relative z-10 w-full max-w-4xl text-center px-6">
            <div id="monitor" class="hidden glass-panel rounded-[50px] p-10 border-2 border-blue-500/30 mb-12 relative shadow-2xl">
                <div class="absolute top-8 right-10 bg-red-600 text-[10px] font-black px-4 py-1 rounded-full flex items-center gap-2">
                    <span class="w-2 h-2 bg-white rounded-full animate-ping"></span> 4K LIVE
                </div>
                
                <div id="feed-screen" class="aspect-video bg-black/60 rounded-[35px] flex flex-col items-center justify-center overflow-hidden border border-white/5">
                    <p class="text-blue-500 font-mono text-xs animate-pulse">CONNECTING TO MAVIC 3 PRO...</p>
                </div>
                
                <div class="mt-6 flex justify-between items-center text-[10px] font-mono text-blue-400 uppercase">
                    <span id="telemetry">GPS Lock: 100%</span>
                    <span>ISO 100 | 4K 60FPS</span>
                </div>
            </div>

            <div id="hero-ui">
                <h2 class="heading text-8xl lg:text-9xl tracking-tighter mb-10">MASTER THE<br><span class="text-blue-600">FLIGHT.</span></h2>
                <button onclick="launchSequence()" class="bg-blue-600 px-14 py-7 rounded-full font-black uppercase tracking-widest hover:bg-blue-500 transition-all shadow-xl shadow-blue-600/30">Launch Deployment Sequence</button>
            </div>
        </div>
    </header>

    <section class="py-40 px-6 max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-3 gap-16">
            <div class="glass-panel p-12 rounded-[50px]">
                <div class="flex items-center gap-6 mb-10">
                    <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-3xl">👤</div>
                    <div>
                        <p class="font-black text-2xl">NEW PILOT</p>
                        <p class="text-xs text-blue-500 font-bold uppercase tracking-widest">Bronze Tier 1</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between text-xs font-bold text-slate-500 uppercase">
                        <span>Sorties Completed</span>
                        <span class="text-white" id="sortie-count">0</span>
                    </div>
                    <div class="h-3 bg-white/5 rounded-full overflow-hidden">
                        <div id="rank-bar" class="h-full bg-blue-600" style="width: 10%"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-12">
                <h3 class="heading text-4xl">BOOK A MISSION</h3>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Service Type</label>
                        <select class="w-full input-field p-5 rounded-2xl">
                            <option>Mapping ($30/hr)</option>
                            <option>Wedding Cinematic ($50/hr)</option>
                            <option>Other Event ($45/hr)</option>
                        </select>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">M-Pesa Number</label>
                        <input type="text" placeholder="2547XXXXXXXX" class="w-full input-field p-5 rounded-2xl">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Flight Date</label>
                        <input type="date" class="w-full input-field p-5 rounded-2xl">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Duration (Hours)</label>
                        <input type="number" value="1" class="w-full input-field p-5 rounded-2xl">
                    </div>
                </div>
                <button onclick="processPay()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase tracking-widest shadow-2xl hover:bg-blue-500 transition">Confirm & Push M-Pesa</button>
            </div>
        </div>
    </section>

    <script>
        let phase = 1;
        let sorties = 0;

        function launchSequence() {
            document.getElementById('hero-ui').classList.add('hidden');
            document.getElementById('monitor').classList.remove('hidden');
            startDroneLogic();
        }

        function startDroneLogic() {
            const drone = document.getElementById('drone-asset');
            const feed = document.getElementById('feed-screen');
            const tel = document.getElementById('telemetry');

            // Reset and Play Flight Animation
            drone.classList.remove('active-flight');
            void drone.offsetWidth; 
            drone.classList.add('active-flight');

            if(phase === 1) { // 1. PHOTO
                tel.innerText = "ALIGNING GIMBAL FOR STILL...";
                setTimeout(() => {
                    feed.innerHTML = "<div class='text-6xl animate-bounce'>📸</div><p class='text-[10px] font-bold mt-4'>4K PHOTO SAVED</p>";
                    screenFlash();
                }, 6000);
                setTimeout(() => { phase = 2; startDroneLogic(); }, 14000);
            }
            else if(phase === 2) { // 2. VIDEO (15s)
                tel.innerText = "RECORDING 15s CINEMATIC...";
                setTimeout(() => {
                    feed.innerHTML = "<div class='text-red-600 font-black animate-pulse text-2xl'>● REC 15s</div><p class='text-white text-[10px] mt-2'>BUFFERING STREAM...</p>";
                }, 6000);
                setTimeout(() => { phase = 3; startDroneLogic(); }, 24000);
            }
            else if(phase === 3) { // 3. MAPPING (20s)
                tel.innerText = "MAPPING SECTOR ALPHA...";
                setTimeout(() => {
                    feed.innerHTML = `
                        <div class="t-grid">
                            <div class="h-20 bg-green-900 border border-green-400 rounded-lg"></div>
                            <div class="h-20 bg-green-800 border border-green-400 rounded-lg"></div>
                            <div class="h-20 bg-green-900 border border-green-400 rounded-lg"></div>
                            <div class="t-base h-20 bg-green-700 border border-green-400 rounded-lg"></div>
                        </div>
                        <p class="text-[10px] font-bold text-green-400 mt-6 tracking-widest">T-FORMATION COMPLETE</p>`;
                }, 6000);
                setTimeout(() => { phase = 1; startDroneLogic(); }, 34000);
            }
        }

        function screenFlash() {
            const f = document.createElement('div');
            f.className = "fixed inset-0 bg-white z-[500] pointer-events-none";
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 100);
        }

        function processPay() {
            sorties++;
            document.getElementById('sortie-count').innerText = sorties;
            document.getElementById('rank-bar').style.width = (sorties * 10) + "%";
            alert("STK Push Initiated. Check your phone!");
        }
    </script>
</body>
</html>
